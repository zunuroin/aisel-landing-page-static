<body>
  <div id="root"></div>
  <script>
    (function(){
      const disclaimer='Aisel adalah produk perangkat lunak independen dan tidak berafiliasi, disponsori, atau didukung secara resmi oleh Meta atau WhatsApp. WhatsApp adalah merek dagang dari pemiliknya masing-masing. Pengguna bertanggung jawab mematuhi kebijakan platform yang digunakan.';
      const routes={'#/contact':'/contact.html','#/acceptable-use-policy':'/acceptable-use-policy.html','#/privacy-policy':'/privacy-policy.html','#/terms-of-service':'/terms-of-service.html','#/refund-policy':'/refund-policy.html','#/data-deletion':'/data-deletion.html'};
      function goStatic(){if(routes[location.hash]) location.replace(routes[location.hash]);}
      function patchLinks(){
        Object.keys(routes).forEach(oldHref=>{document.querySelectorAll('a[href="'+oldHref+'"]').forEach(a=>a.setAttribute('href',routes[oldHref]))});
        document.querySelectorAll('a[href="#contact"]').forEach(a=>a.setAttribute('href','/contact.html'));
        document.querySelectorAll('a').forEach(a=>{const txt=(a.textContent||'').trim(); if(txt==='Kontak'||txt==='Contact') a.setAttribute('href','/contact.html')});
        const footerLinks=document.querySelector('footer .flex.flex-wrap.gap-4');
        if(footerLinks){const needed=[['/acceptable-use-policy.html','Acceptable Use Policy'],['/privacy-policy.html','Privacy Policy'],['/terms-of-service.html','Terms of Service'],['/refund-policy.html','Refund Policy'],['/data-deletion.html','Data Deletion'],['/contact.html','Contact']];needed.reverse().forEach(([href,label])=>{if(!footerLinks.querySelector('[href="'+href+'"]')){const l=document.createElement('a');l.href=href;l.className='text-sm text-slate-300 hover:text-white';l.textContent=label;footerLinks.insertBefore(l,footerLinks.firstChild)}});}
        const footerText=document.querySelector('footer .mx-auto.grid > div:first-child');
        if(footerText&&!document.getElementById('aisel-footer-company')){const c=document.createElement('p');c.id='aisel-footer-company';c.className='aisel-footer-company';c.innerHTML='<strong>Legal:</strong> PT. Aisel Intelligence Systems<br><strong>Email:</strong> hello@aisel.ai · <strong>Phone:</strong> +62 851-7890-8376';footerText.appendChild(c)}
        if(footerText&&!document.getElementById('aisel-meta-whatsapp-disclaimer')){const p=document.createElement('p');p.id='aisel-meta-whatsapp-disclaimer';p.className='aisel-platform-disclaimer';p.textContent=disclaimer;footerText.appendChild(p)}
      }
      goStatic(); window.addEventListener('hashchange',goStatic); window.addEventListener('DOMContentLoaded',()=>{setTimeout(patchLinks,250);setTimeout(patchLinks,800);setTimeout(patchLinks,1600)}); setTimeout(patchLinks,2200);
    })();
  </script>
