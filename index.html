<body>
  <div id="root"></div>
  <script>
    (function(){
      const disclaimer='Aisel adalah produk perangkat lunak independen dan tidak berafiliasi, disponsori, atau didukung secara resmi oleh Meta atau WhatsApp. WhatsApp adalah merek dagang dari pemiliknya masing-masing. Pengguna bertanggung jawab mematuhi kebijakan platform yang digunakan.';
      function goStatic(){if(location.hash==='#/contact') location.replace('/contact.html'); if(location.hash==='#/acceptable-use-policy') location.replace('/acceptable-use-policy.html');}
      function patchLinks(){
        document.querySelectorAll('a[href="#/contact"],a[href="#contact"]').forEach(a=>{a.setAttribute('href','/contact.html')});
        document.querySelectorAll('a').forEach(a=>{if((a.textContent||'').trim()==='Kontak'||(a.textContent||'').trim()==='Contact') a.setAttribute('href','/contact.html')});
        const footerLinks=document.querySelector('footer .flex.flex-wrap.gap-4');
        if(footerLinks&&!footerLinks.querySelector('[href="/acceptable-use-policy.html"]')){const l=document.createElement('a');l.href='/acceptable-use-policy.html';l.className='text-sm text-slate-300 hover:text-white';l.textContent='Acceptable Use Policy';footerLinks.insertBefore(l,footerLinks.firstChild)}
        const footerText=document.querySelector('footer .mx-auto.grid > div:first-child');
        if(footerText&&!document.getElementById('aisel-meta-whatsapp-disclaimer')){const p=document.createElement('p');p.id='aisel-meta-whatsapp-disclaimer';p.className='aisel-platform-disclaimer';p.textContent=disclaimer;footerText.appendChild(p)}
        if(location.hash==='#/terms-of-service'){const article=document.querySelector('main article');if(article&&!article.querySelector('.aisel-terms-disclaimer')){const s=document.createElement('section');s.className='aisel-terms-disclaimer';s.innerHTML='<h2>Hubungan dengan Meta dan WhatsApp</h2><p>'+disclaimer+'</p>';article.appendChild(s)}}
      }
      goStatic(); window.addEventListener('hashchange',goStatic); window.addEventListener('DOMContentLoaded',()=>{setTimeout(patchLinks,300);setTimeout(patchLinks,900);setTimeout(patchLinks,1600)}); setTimeout(patchLinks,2200);
    })();
  </script>
